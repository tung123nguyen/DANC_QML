experiment:
  name: q2_angle_basic_entangler_s3_n100_f4_d2
  seed: 2
data:
  scenario: S3
  train_samples_per_class: 100
  test_samples_per_class: 500
  n_features: 4
model:
  type: qnn
  encoding: angle
  ansatz: basic_entangler
  n_qubits: 4
  depth: 2
  device: lightning.qubit
  angle_clip: 3.0
training:
  epochs: 80
  learning_rate: 0.05
  batch_size: 32
evaluation:
  log_gradients: true
