experiment:
  name: q3_angle_strongly_entangling_s1_n250_f4_d2
  seed: 2
data:
  scenario: S1
  train_samples_per_class: 250
  test_samples_per_class: 500
  n_features: 4
model:
  type: qnn
  encoding: angle
  ansatz: strongly_entangling
  n_qubits: 4
  depth: 2
